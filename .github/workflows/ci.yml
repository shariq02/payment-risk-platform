name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: payment_risk_platform
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
          pip install protobuf==4.25.3
      
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          payment_risk_platform:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                password: testpass
                dbname: payment_risk_platform
                schema: public
                threads: 4
          EOF
      
      - name: Download seed file
        run: |
          mkdir -p dbt/seeds
          wget -O dbt/seeds/product_category_name_translation.csv https://raw.githubusercontent.com/olist/work-at-olist-data/master/datasets/product_category_name_translation.csv
      
      - name: Lint with ruff
        run: ruff check .
        continue-on-error: true
      
      - name: Set up database schema
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: payment_risk_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        run: |
          python ingestion/setup_warehouse.py
      
      - name: Load dbt seed
        run: |
          cd dbt
          dbt seed --profiles-dir ~/.dbt --project-dir .
      
      - name: Run dbt compile
        run: |
          cd dbt
          dbt compile --profiles-dir ~/.dbt --project-dir .
      
      - name: Run tests
        run: pytest tests/ -v
        continue-on-error: true
